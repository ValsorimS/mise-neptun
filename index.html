<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nano Banán: Mise Neptun</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #000; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; 
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
        }
        #info { font-size: 20px; font-weight: bold; color: #3498db; }
        #status { margin-top: 5px; font-size: 14px; }
        #controls { 
            position: absolute; 
            top: 10px; 
            right: 10px; 
            color: rgba(255,255,255,0.7); 
            background: rgba(0,0,0,0.5); 
            padding: 5px 10px; 
            border-radius: 5px;
            font-size: 12px;
            pointer-events: none;
        }
        #joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 150px;
            height: 150px;
            z-index: 10;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.0/nipplejs.min.js"></script>
</head>
<body>

    <div id="ui">
        <div id="info">Plast: <span id="plast-count">0</span>/10</div>
        <div id="status">Sbírej plasty pro Neopren!</div>
        <div id="inventory" style="margin-top: 15px; font-size: 14px; color: #f1c40f; border-top: 1px solid gray; padding-top: 10px;">
            <strong>Batoh:</strong><br>
            Dřevo: <span id="inv-wood">0</span> | Hlína: <span id="inv-dirt">0</span><br>
            Kámen: <span id="inv-stone">0</span> | Železo: <span id="inv-iron">0</span><br>
            Zlato: <span id="inv-gold">0</span> | Diamanty: <span id="inv-diamond">0</span>
        </div>
        <div id="tools" style="margin-top: 10px; font-size: 14px; color: #ecf0f1; border-top: 1px solid gray; padding-top: 10px;">
            <strong>V ruce:</strong> <span id="current-tool" style="color: #e74c3c; font-weight: bold;">Dřevěný krumpáč</span><br>
            <span style="font-size: 11px; color: #bdc3c7;">[1] Sekera | [2] Krumpáč | [3] Lopata</span>
        </div>
    </div>
    <div id="crafting" style="position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.8); color: white; padding: 15px; border-radius: 8px; z-index: 10; font-family: sans-serif;">
        <h3 style="margin-top: 0; margin-bottom: 10px; color: #2ecc71; font-size: 16px;">Dílna (Crafting)</h3>
        
        <button id="btn-craft-stone" style="display: block; width: 100%; margin-bottom: 8px; padding: 5px; cursor: pointer; background: #34495e; color: white; border: 1px solid #7f8c8d; border-radius: 4px;">
            Kamenný krumpáč<br><span style="font-size: 10px;">(3 Kámen, 2 Dřevo)</span>
        </button>
        
        <button id="btn-craft-iron" style="display: block; width: 100%; margin-bottom: 8px; padding: 5px; cursor: pointer; background: #34495e; color: white; border: 1px solid #7f8c8d; border-radius: 4px;">
            Železný krumpáč<br><span style="font-size: 10px;">(3 Železo, 2 Dřevo)</span>
        </button>
        
        <button id="btn-craft-diamond" style="display: block; width: 100%; margin-bottom: 8px; padding: 5px; cursor: pointer; background: #34495e; color: white; border: 1px solid #7f8c8d; border-radius: 4px;">
            Diamantový krumpáč<br><span style="font-size: 10px;">(3 Diamant, 2 Dřevo)</span>
        </button>
        
        <div id="craft-msg" style="font-size: 12px; margin-top: 5px; text-align: center; height: 15px;"></div>
    </div>
    
    <div id="controls">PC: W,A,S,D | Mobil: Joystick</div>
    <div id="joystick-zone"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module" src="game.js"></script>

</body>
</html>
